name: fiscal_a_test
description: "A Smart Financial Information System."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  google_generative_ai: ^0.4.7
  local_auth: ^3.0.1
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png